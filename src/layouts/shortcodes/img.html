{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" | default "" -}}
{{- $caption := .Get "caption" -}}
{{- $credit := .Get "credit" -}}
<figure class="figure">
  <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy" decoding="async">
  {{- if or $caption $credit -}}
  <figcaption class="meta">
    {{- with $caption }}{{ . }}{{ end -}}
    {{- if and $caption $credit }} &mdash; {{ end -}}
    {{- with $credit }}<span>{{ . }}</span>{{ end -}}
  </figcaption>
  {{- end -}}
</figure>
