{{- define "main" -}}
<main class="page-main" id="main-content">
  <div class="about-hero container">
    <div class="about-hero__photo">
      <img src="/images/pedro.jpg" alt="Pedro Dias" loading="eager">
    </div>
    <div class="about-hero__intro">
      <h1 class="display-title">{{ .Title }}</h1>
      {{- with .Description -}}<p class="about-hero__description">{{ . }}</p>{{- end -}}
    </div>
  </div>
  <div class="post-content container--narrow">
    {{ .Content | safeHTML }}
  </div>
</main>
{{- end -}}
