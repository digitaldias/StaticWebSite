{{- define "main" -}}
<div class="container">
  <header class="page-header">
    <h1 class="display-title">{{ .Title }}</h1>
    <p class="meta">{{ len .Pages }} {{ if eq (len .Pages) 1 }}term{{ else }}terms{{ end }}</p>
  </header>

  <ul class="taxonomy-list">
    {{- range .Pages -}}
    <li class="taxonomy-term">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="meta">({{ len .Pages }})</span>
    </li>
    {{- end -}}
  </ul>
</div>
{{- end -}}
