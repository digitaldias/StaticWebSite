baseURL = 'https://digitaldias.com/'
languageCode = 'en-us'
title = 'DigitalDias - Pedro Dias'
author = 'Pedro Dias'
copyright = '© 2025 Pedro Dias. All rights reserved.'

# Pagination
[pagination]
  pagerSize = 10

# Taxonomies
[taxonomies]
  category = 'categories'
  tag = 'tags'

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow HTML in markdown
  [markup.highlight]
    style = 'dracula'
    lineNos = false
    lineNumbersInTable = false
    codeFences = true
    guessSyntax = true
    noClasses = false

# Params
[params]
  description = 'Software Architect, Content Creator, and Family Man based in Frogner, Norway'
  author = 'Pedro Dias'
  location = 'Frogner, Norway'
  email = 'pedro.dias@tradesolution.no'
  
  # Social links
  [params.social]
    linkedin = 'https://linkedin.com/in/digitaldias'
    github = 'https://github.com/digitaldias'
    youtube_digitaldias = 'https://youtube.com/@digitaldias'
    youtube_digitalhome = 'https://youtube.com/@digitalhome'
    flickr = 'https://flickr.com/photos/digitaldias'
    facebook = 'https://facebook.com/pedrodiaspt'
  
  # Stats for hero section
  [params.stats]
    age = 41
    photos = 172
    channels = 2
    family = '∞'
  
  # Support links
  [params.support]
    kofi = 'https://ko-fi.com/digitaldias'
  
  [params.currently]
    building   = "An AI strategy framework and 1:1 training program for the company"
    listening  = "Angine de Poitrine"
    tinkering  = "Fixing my house up"
    annoyed_by = "The weather"

  [params.photo]
    src = "/images/pedro.jpg"
    alt = "Pedro Dias"

  # Positions held — update whenever an opinion sharpens or a new one forms
  [params.positions]
    items = [
      "Local models for coding aren't up for the task yet.",
      "Coding is dead. Architecture is the new profession.",
      "Buy rechargeable batteries.",
      "Automate your house.",
    ]

  # Giscus comments configuration
  [params.giscus]
    repo = "digitaldias/StaticWebSite"
    repoId = "R_kgDOQZVsAA"
    category = "General"
    categoryId = "DIC_kwDOQZVsAM4C1Zhn"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "dark"
    lang = "en"

# Asset processing
[build]
  writeStats = true

# Sitemap configuration
[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

# RSS and JSON Feed configuration
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  blog = ['HTML', 'RSS', 'JSON']
